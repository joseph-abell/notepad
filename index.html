<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A5 Notepage</title>
  <style>
    @page {
      size: A5;
      margin: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f4f1e8;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
    }

    body {
      width: 148mm;
      height: 210mm;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 8mm;
      display: flex;
      flex-direction: column;
      gap: 5mm;
    }

    .header {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 1fr;
      gap: 3mm;
      border: none;
    }

    .field {
      min-height: 14mm;
      border: 1px solid #222;
      padding: 3mm 4mm;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .line {
      width: 100%;
      border-bottom: 1px solid #777;
      min-height: 5mm;
    }

    .notes {
      flex: 0 0 94mm;
      border: 1px solid #222;
      padding: 5mm;
      box-sizing: border-box;
      background:
        linear-gradient(to bottom, transparent calc(100% - 1px), rgba(0,0,0,0.08) 1px);
      background-size: 100% 7mm;
      overflow: hidden;
    }

    .footer {
    }

    .med {
      border: 1px solid #222;
      padding: 2.5mm;
      box-sizing: border-box;
      min-height: 15mm;
    }

    .med-name {
      font-size: 9pt;
      margin-bottom: 1.5mm;
    }


    .box {
      width: 4.5mm;
      height: 4.5mm;
      margin-right: 2mm;
      border: 1px solid #222;
      box-sizing: border-box;
      display: inline-block;
    }

    @media print {
      body {
        background: white;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header" aria-label="Header fields">
      <div class="field"><div class="line" aria-label="Date"></div></div>
      <div class="field"><div class="line" aria-label="Location"></div></div>
      <div class="field"><div class="line" aria-label="Mood"></div></div>
    </section>

    <section class="notes" aria-label="Notes area"></section>

    <footer class="footer" aria-label="Medicine tracker">
      <div class="med">
        <div class="med-name">Metformin</div>
        <div class="boxes" aria-label="3 boxes for metformin">
          <span class="box"></span><span class="box"></span><span class="box"></span>
        </div>
      </div>

      <div class="med">
        <div class="med-name">Sertraline</div>
        <div class="boxes" aria-label="1 box for sertraline">
          <span class="box"></span>
        </div>
      </div>

      <div class="med">
        <div class="med-name">Loperamide</div>
        <div class="boxes" aria-label="6 boxes for loperamide">
          <span class="box"></span><span class="box"></span><span class="box"></span>
          <span class="box"></span><span class="box"></span><span class="box"></span>
        </div>
      </div>

      <div class="med">
        <div class="med-name">Buscopan</div>
        <div class="boxes" aria-label="6 boxes for buscopan">
          <span class="box"></span><span class="box"></span><span class="box"></span>
          <span class="box"></span><span class="box"></span><span class="box"></span>
        </div>
      </div>
    </footer>
  </main>
</body>
</html>
