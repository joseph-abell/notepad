<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A5 Notepage</title>
  <style>
    @page {
      size: A5;
      margin: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f4f1e8;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
    }

    body {
      width: 148mm;
      height: 210mm;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 10mm;
      display: flex;
      flex-direction: column;
      gap: 8mm;
    }

    .header {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 1fr;
      gap: 4mm;
    }

    .field {
      min-height: 18mm;
      border: 1px solid #222;
      border-radius: 3mm;
      padding: 3mm 4mm;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .line {
      width: 100%;
      border-bottom: 1px solid #777;
      min-height: 6mm;
    }

    .notes {
      flex: 1;
      border: 1px solid #222;
      border-radius: 3mm;
      padding: 6mm;
      box-sizing: border-box;
      background:
        linear-gradient(to bottom, transparent calc(100% - 1px), rgba(0,0,0,0.08) 1px);
      background-size: 100% 8mm;
    }

    @media print {
      body {
        background: white;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header" aria-label="Header fields">
      <div class="field">
        <div class="line" aria-label="Date"></div>
      </div>
      <div class="field">
        <div class="line" aria-label="Location"></div>
      </div>
      <div class="field">
        <div class="line" aria-label="Mood"></div>
      </div>
    </section>

    <section class="notes" aria-label="Notes area"></section>
  </main>
</body>
</html>
